# =============================================================================
# Pricing brackets (cost-function pricing)
#
# How it works: for each item, classify by (invoice_type, tier, category) →
# pick the first bracket where landed_cost <= max_cost → multiplier =
# 1 / (1 - target_margin). That multiplier replaces the legacy lerp curve.
#
# Categories:
#   apparel       — Jacket, Coat, Dress, Pants, Top, Skirt, Shirt, Vest, Set, etc.
#   bags          — Handbag, Shoulder Bag, Tote, Backpack, Boston, Duffle, etc.
#   accessories   — Scarf, Belt, Sunglasses, Wallet, Pouch, Card Holder, etc.
#
# Tiers come from tier_brands (luxury/mid) — anything not listed = "standard".
#
# To tune: edit the target_margin values below and reload the app.
# Snapshot tests don't check prices, only titles — safe to iterate freely.
# =============================================================================
pricing_brackets:

  # ---------------------------------------------------------------------------
  # VENDOR INVOICES (BrandStreet / DKC / manual entry)
  # cost = item_price (native) * exchange_rate * 1.2 (handling) * 1.15 (import)
  # ---------------------------------------------------------------------------
  vendor_invoice:

    luxury_apparel:
      - { max_cost:   100, target_margin: 0.75 }   # 4.00×  small/cheap items
      - { max_cost:   200, target_margin: 0.70 }   # 3.33×
      - { max_cost:   350, target_margin: 0.65 }   # 2.86×
      - { max_cost:   600, target_margin: 0.60 }   # 2.50×
      - { max_cost: 99999, target_margin: 0.55 }   # 2.22×  hero-tier costs

    luxury_bags:
      - { max_cost:   200, target_margin: 0.65 }   # 2.86×
      - { max_cost:   500, target_margin: 0.55 }   # 2.22×
      - { max_cost:   800, target_margin: 0.50 }   # 2.00×
      - { max_cost: 99999, target_margin: 0.45 }   # 1.82×

    luxury_accessories:                              # scarves/belts/wallets/sunglasses
      - { max_cost:    50, target_margin: 0.80 }   # 5.00×
      - { max_cost:   150, target_margin: 0.75 }   # 4.00×
      - { max_cost:   300, target_margin: 0.65 }   # 2.86×
      - { max_cost: 99999, target_margin: 0.55 }   # 2.22×

    mid_apparel:
      - { max_cost:   100, target_margin: 0.70 }   # 3.33×
      - { max_cost:   200, target_margin: 0.65 }   # 2.86×
      - { max_cost:   400, target_margin: 0.60 }   # 2.50×
      - { max_cost: 99999, target_margin: 0.55 }   # 2.22×

    mid_bags:
      - { max_cost:   150, target_margin: 0.60 }   # 2.50×
      - { max_cost:   400, target_margin: 0.50 }   # 2.00×
      - { max_cost: 99999, target_margin: 0.45 }   # 1.82×

    mid_accessories:
      - { max_cost:    75, target_margin: 0.75 }   # 4.00×
      - { max_cost:   200, target_margin: 0.65 }   # 2.86×
      - { max_cost: 99999, target_margin: 0.55 }   # 2.22×

    standard_apparel:
      - { max_cost:    75, target_margin: 0.70 }   # 3.33×
      - { max_cost:   200, target_margin: 0.60 }   # 2.50×
      - { max_cost: 99999, target_margin: 0.55 }   # 2.22×

    standard_bags:
      - { max_cost:   150, target_margin: 0.55 }   # 2.22×
      - { max_cost: 99999, target_margin: 0.45 }   # 1.82×

    standard_accessories:
      - { max_cost:    50, target_margin: 0.75 }   # 4.00×
      - { max_cost: 99999, target_margin: 0.60 }   # 2.50×

  # ---------------------------------------------------------------------------
  # BUYEE INVOICES (Yahoo Auctions purchases — auction risk premium baked in)
  # cost = bid_price_jpy * exchange_rate * 1.2 (Buyee §10 actual_cost)
  # ---------------------------------------------------------------------------
  buyee:

    luxury_apparel:
      - { max_cost:   100, target_margin: 0.80 }   # 5.00×
      - { max_cost:   250, target_margin: 0.75 }   # 4.00×
      - { max_cost:   500, target_margin: 0.65 }   # 2.86×
      - { max_cost: 99999, target_margin: 0.55 }   # 2.22×

    luxury_bags:
      - { max_cost:   200, target_margin: 0.70 }   # 3.33×
      - { max_cost:   500, target_margin: 0.60 }   # 2.50×
      - { max_cost: 99999, target_margin: 0.50 }   # 2.00×

    luxury_accessories:
      - { max_cost:    50, target_margin: 0.85 }   # 6.67×
      - { max_cost:   150, target_margin: 0.80 }   # 5.00×
      - { max_cost: 99999, target_margin: 0.65 }   # 2.86×

    mid_apparel:
      - { max_cost:   100, target_margin: 0.75 }   # 4.00×
      - { max_cost:   250, target_margin: 0.70 }   # 3.33×
      - { max_cost: 99999, target_margin: 0.60 }   # 2.50×

    mid_bags:
      - { max_cost:   150, target_margin: 0.65 }   # 2.86×
      - { max_cost: 99999, target_margin: 0.55 }   # 2.22×

    mid_accessories:
      - { max_cost:   100, target_margin: 0.80 }   # 5.00×
      - { max_cost: 99999, target_margin: 0.65 }   # 2.86×

    standard_apparel:
      - { max_cost:   100, target_margin: 0.75 }   # 4.00×
      - { max_cost: 99999, target_margin: 0.60 }   # 2.50×

    standard_bags:
      - { max_cost:   200, target_margin: 0.60 }   # 2.50×
      - { max_cost: 99999, target_margin: 0.50 }   # 2.00×

    standard_accessories:
      - { max_cost:    75, target_margin: 0.80 }   # 5.00×
      - { max_cost: 99999, target_margin: 0.65 }   # 2.86×

# =============================================================================
# Pricing floors (cost-relative profit guards, applied AFTER bracket lookup)
#
# Two-sided guard: ensure every item makes at least `min_dollar_profit`, and
# never priced higher than `max_markup_multiple × cost`. Both are applied AFTER
# the bracket multiplier + market_adjustment + demand pipeline but BEFORE
# rounding, so the floors/ceilings respect cost realistically and round_price
# still snaps cleanly to the 25/45/75/95 ladder.
#
# Why these guard rails exist:
#   * `min_dollar_profit` — for cheap items (e.g. $20 cost) a 3× markup yields
#     only $40 profit, which doesn't cover shop overhead per listing.
#   * `max_markup_multiple` — for very cheap items (e.g. $5 cost), even a
#     reasonable margin% pushes the price into "feels-overpriced" territory.
#     A hard 6× ceiling means a $5 scarf maxes out at $30 — realistic.
# =============================================================================
pricing_floors:
  vendor_invoice:
    min_dollar_profit: 80      # Never list an item for less than $80 profit.
    max_markup_multiple: 6.0   # Never price above 6× landed cost.
  buyee:
    min_dollar_profit: 60      # Buyee items often have lower base cost.
    max_markup_multiple: 8.0   # Auction items have wider markup range.
