# =============================================================================
# rules.yaml — single source of truth for invoice transcriber heuristics
# =============================================================================
#
# HOW TO USE THIS FILE
# --------------------
#   * Edit it by hand. YAML is forgiving: keep indentation as 2 spaces,
#     keep strings with apostrophes in "double quotes" (e.g. "90's").
#   * Or open the "Rules & Notes" tab in the Streamlit app for a UI view.
#   * Run `uv run python -m heuristics view` for a terminal dump.
#   * Run `uv run python -m heuristics search burberry` to find rules.
#   * Run `uv run python -m heuristics note "your feedback"` to save a note.
#
# MIGRATION STATUS
# ----------------
# Each section is marked WIRED or MIRROR.
#   WIRED   = code reads this file directly. Edits take effect on next run.
#   MIRROR  = code still hardcodes this. Edit the YAML for documentation /
#             planning, but also edit the source file noted below until
#             that area is migrated.
#
#   model_era         WIRED   (pricing.py)
#   brand_archetypes  WIRED   (extractors.py)
#   silhouette        WIRED   (extractors.py SILHOUETTE_CATEGORICAL)
#   acronyms          WIRED   (pricing.py _ACRONYMS)
#   canonicalize      WIRED   (pricing.py _BRAND_ALIASES, _TYPE_ALIASES)
#   tier_brands       WIRED   (pricing.py LUXURY_BRANDS, MID_TIER_BRANDS)
#
# All sections now load from this YAML. Edits take effect on next Python start.
# Each section has an inline `_X_FALLBACK` constant in its source file used
# only if the YAML loader fails (missing pyyaml, parse error).
# =============================================================================

meta:
  version: 1
  title_format: "[Era] Brand Color Pattern Material Category"
  notes: |
    Strict structured-only titles. Never leak description text.
    Era is gated to 4-digit years by default; decades may be allowed
    per category in the future via titles.era_policy.allow_decades_for.

# =============================================================================
# Title rules
# =============================================================================
titles:
  era_policy:
    # 4-digit years ("1997") always pass through to titles regardless of category.
    allow_in_title_regex: '^\d{4}$'
    # Categories where decades like "90's", "00's" are *also* allowed.
    # For vintage resale, decade is a high-volume SEO term across most
    # categories: "90's Fendi Shirt", "00's Celine Set", "Y2K Chanel Bag".
    # We intentionally include apparel because vintage shoppers search by era.
    # (Y2K is already canonicalized to "00's" in extractors before reaching
    # the title.)
    allow_decades_for:
      # Bags / accessories
      - Handbag
      - Shoulder Bag
      - Clutch Bag
      - Clutch
      - Tote Bag
      - Hobo Bag
      - Duffle Bag
      - Duffel Bag
      - Boston Bag
      - Travel Bag
      - Weekender
      - Backpack
      - Crossbody Bag
      - Pouch
      - Belt Bag
      - Bag
      - Sunglasses
      - Scarf
      - Belt
      # Outerwear
      - Coat
      - Trench Coat
      - Fur Coat
      - Jacket
      - Leather Jacket
      - Blazer
      # Tops
      - Top
      - Shirt
      - T-Shirt
      - Blouse
      - Cardigan
      - Sweater
      - Vest
      # Bottoms / dresses
      - Dress
      - Skirt
      - Pants
      # Shoes
      - Shoes
      - Boots
      - Heels
      - Pumps
      - Loafers
      - Sneakers
      - Sandals
      - Mules
      - Slides
      - Ballet Flats
      # Catch-alls
      - Set

  # Silhouettes that move to END of style chain instead of front.
  # e.g. "Vivienne Tam Black Flower Mesh Corsage Wrap Top" (Wrap last)
  # rather than "Vivienne Tam Black Wrap Flower Mesh Corsage Top".
  silhouette_categorical:
    - Wrap
    - A-Line
    - Sheath
    - Shift
    - Empire
    - Fit-and-Flare

  # Materials that EARN a place in product titles. Anything not in this list
  # (Cotton, Polyester, Nylon, regular Wool, Linen, etc.) is dropped from
  # title rendering — the material is still stored on the item for cost /
  # internal use, just suppressed in the title because it doesn't add
  # luxury / SEO value. Edit this list to tighten or loosen.
  # Match is case-insensitive on the canonical material name.
  deluxe_materials:
    # Leathers
    - Leather
    - Lambskin
    - Patent Leather
    - Suede
    - Pony Hair
    - Goat Leather
    - Calf Leather
    # Exotic skins
    - Crocodile
    - Alligator
    - Python
    - Snake
    - Snakeskin
    - Ostrich
    - Lizard
    - Stingray
    # Furs
    - Mink
    - Fox Fur
    - Sable
    - Chinchilla
    - Rabbit Fur
    - Raccoon Fur
    - Squirrel Fur
    - Weasel Fur
    - Shearling
    - Sheepskin
    - Fur
    # Luxury fabrics
    - Cashmere
    - Silk
    - Satin
    - Velvet
    - Tweed
    - Mohair
    - Alpaca
    - Boucle
    - Pashmina
    - Chiffon
    - Organza
    - Tulle
    - Jacquard
    - Brocade
    - Sequin
    - Lamé
    - Lurex
    - Linen
    # Brand-signature leathers / canvases
    - Saffiano Leather
    - Caviar Leather
    - Coated Canvas    # LV / Goyard signature
    - Monogram Canvas  # LV
    - GG Canvas        # Gucci

  # Tokens that stay ALL-CAPS through smart_title()
  acronyms_uppercase:
    - CC
    - LV
    - GG
    - GC
    - DG
    - YSL
    - MM
    - II
    - III
    - IV
    - V
    - NY
    - LA
